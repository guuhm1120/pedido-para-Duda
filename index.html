<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>Para Isabelle ❤️</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: black;
    color: white;
    overflow: hidden;
    position: relative;
  }
  .slideshow {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
    overflow: hidden;
  }
  .slide {
    position: absolute;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  .slide.active {
    opacity: 1;
  }
  .overlay {
    position: absolute;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1;
  }
  .container {
    z-index: 2;
    max-width: 700px;
    padding: 20px;
    position: relative;
  }
  h1 {
    font-size: 30px;
    text-shadow: 2px 2px 8px black;
  }
  #contador-amor {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.8;
  }
  .botoes {
    margin-top: 30px;
  }
  button {
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin: 10px;
    transition: transform 0.2s;
  }
  #sim {
    background: #2ecc71;
    color: white;
  }
  #sim:hover {
    transform: scale(1.15);
  }
  #nao {
    background: #e74c3c;
    color: white;
    position: absolute;
  }
  #mensagem {
    margin-top: 30px;
    font-size: 28px;
    font-weight: bold;
    display: none;
  }
  .heart {
    position: absolute;
    font-size: 22px;
    animation: subir linear infinite;
    user-select: none;
  }
  @keyframes subir {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
  }
  .confete {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: cair 3s linear forwards;
  }
  @keyframes cair {
    to {
      transform: translateY(100vh) rotate(720deg);
      opacity: 0;
    }
  }
  /* Animação aliança */
  .alianca {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 5px solid gold;
    box-shadow: 0 0 15px gold;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    animation-fill-mode: forwards;
  }
  .alianca.show {
    animation: alianca-aparece 1s forwards;
  }
  @keyframes alianca-aparece {
    0% {
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }
    50% {
      transform: translate(-50%, -50%) scale(1.2);
      opacity: 1;
    }
    100% {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
  }
  /* Fogos de artifício */
  .fogo {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    filter: drop-shadow(0 0 4px);
    animation: fogo-explode 700ms ease-out forwards;
  }
  @keyframes fogo-explode {
    0% {
      transform: scale(0);
      opacity: 1;
    }
    100% {
      transform: scale(1);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="slideshow">
  <div class="slide active" style="background-image:url('foto.jpg')"></div>
  <div class="slide" style="background-image:url('isabelle.jpg')"></div>
  <div class="slide" style="background-image:url('bebe.jpg')"></div>
</div>

<div class="overlay"></div>

<div class="container">
  <h1>
    Isabelle ❤️<br><br>
    Você aceita ser feliz para sempre ao meu lado<br>
    e nunca soltar a minha mão, assim como eu nunca soltarei a sua?
  </h1>
  <div id="contador-amor"></div>
  <div class="botoes">
    <button id="sim">Sim 💖</button>
    <button id="nao">Não 😢</button>
  </div>
  <div id="mensagem">
    💍 Parabéns Isabelle! Você escolheu o caminho do nosso amor, te quero pra sempre, Eu te amo muito ❤️
  </div>
  <div class="alianca" id="alianca"></div>
</div>

<audio id="musica" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8a0c1e0f1.mp3" type="audio/mpeg">
</audio>

<script>
  // Slideshow
  const slides = document.querySelectorAll('.slide');
  let currentSlide = 0;
  setInterval(() => {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
  }, 5000);

  const nao = document.getElementById('nao');
  const sim = document.getElementById('sim');
  const mensagem = document.getElementById('mensagem');
  const musica = document.getElementById('musica');
  const alianca = document.getElementById('alianca');
  const contadorAmor = document.getElementById('contador-amor');

  // Botão não foge
  function fugir() {
    const largura = window.innerWidth - nao.offsetWidth;
    const altura = window.innerHeight - nao.offsetHeight;
    const x = Math.random() * largura;
    const y = Math.random() * altura;
    nao.style.left = x + 'px';
    nao.style.top = y + 'px';
  }
  nao.addEventListener('mouseover', fugir);
  nao.addEventListener('touchstart', fugir);

  // Contador de tempo de amor desde uma data
  const inicio = new Date("2024-01-01T00:00:00");
  function atualizarContador() {
    const agora = new Date();
    const diff = agora - inicio;
    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diff / (1000 * 60)) % 60);
    const segundos = Math.floor((diff / 1000) % 60);
    contadorAmor.textContent = `Meu amor por você já dura: ${dias} dias ${horas}h ${minutos}m ${segundos}s ❤️`;
  }
  setInterval(atualizarContador, 1000);
  atualizarContador();

  // Corações subindo
  function criarCoracao() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.textContent = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.fontSize = (20 + Math.random() * 20) + 'px';
    heart.style.animationDuration = (4 + Math.random() * 4) + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
  }
  setInterval(criarCoracao, 400);

  // Confete
  function criarConfete() {
    const confete = document.createElement('div');
    confete.classList.add('confete');
    confete.style.left = Math.random() * 100 + 'vw';
    confete.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
    document.body.appendChild(confete);
    setTimeout(() => confete.remove(), 3000);
  }

  // Fogos de artifício
  function criarFogo(x, y) {
    for (let i = 0; i < 20; i++) {
      const fogo = document.createElement('div');
      fogo.classList.add('fogo');
      fogo.style.width = fogo.style.height = (5 + Math.random() * 10) + 'px';
      fogo.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
      fogo.style.left = x + (Math.random() * 100 - 50) + 'px';
      fogo.style.top = y + (Math.random() * 100 - 50) + 'px';
      fogo.style.animationDuration = (500 + Math.random() * 700) + 'ms';
      document.body.appendChild(fogo);
      fogo.addEventListener('animationend', () => fogo.remove());
    }
  }

  // Quando clicar em Sim
  sim.addEventListener('click', () => {
    mensagem.style.display = 'block';
    musica.play();

    alianca.classList.add('show');
    // Posiciona aliança perto do botão "Sim"
    const rect = sim.getBoundingClientRect();
    alianca.style.top = rect.top + rect.height / 2 + 'px';
    alianca.style.left = rect.left + rect.width / 2 + 'px';

    for (let i = 0; i < 150; i++) {
      criarConfete();
    }
    criarFogo(window.innerWidth / 2, window.innerHeight / 2);
  });
</script>

</body>
</html>
