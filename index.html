<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Maria Eduarda ❤️</title>

<style>

body{
margin:0;
height:100vh;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
overflow:hidden;

background-image:url("WhatsApp Image 2026-04-09 at 12.23.55.jpeg");
background-size:cover;
background-position:center;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:0;
}

.container{
z-index:1;
max-width:700px;
padding:20px;
}

h1{
font-size:32px;
text-shadow:2px 2px 10px black;
}

.botoes{
margin-top:30px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
}

#sim{
background:#2ecc71;
color:white;
transition:0.3s;
}

#sim:hover{
transform:scale(1.1);
}

#nao{
background:#e74c3c;
color:white;
position:absolute;
}

#mensagem{
margin-top:30px;
font-size:28px;
font-weight:bold;
display:none;
}

.heart{
position:absolute;
font-size:22px;
animation:subir linear infinite;
}

@keyframes subir{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

.confete{
position:absolute;
width:10px;
height:10px;
animation:cair 3s linear forwards;
}

@keyframes cair{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1>
Maria Eduarda ❤️  
<br><br>
Topa um segundo encontro?
  (podemos sair pra comer, beber, alugar um airbnb pra fica juntos, quero tudo desde que seja contigo) 
</h1>

<div class="botoes">
<button id="sim">Sim 💖</button>
<button id="nao">Não 😢</button>
</div>

<div id="mensagem">
💍 Parabéns Duda!  
Você escolheu certo, não vai se arrepender ❤️
</div>

</div>

<audio id="musica" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8a0c1e0f1.mp3">
</audio>

<script>

const nao=document.getElementById("nao")
const sim=document.getElementById("sim")
const mensagem=document.getElementById("mensagem")
const musica=document.getElementById("musica")

function fugir(){

const largura=window.innerWidth-nao.offsetWidth
const altura=window.innerHeight-nao.offsetHeight

const x=Math.random()*largura
const y=Math.random()*altura

nao.style.left=x+"px"
nao.style.top=y+"px"

}

nao.addEventListener("mouseover",fugir)
nao.addEventListener("touchstart",fugir)

sim.addEventListener("click",()=>{

mensagem.style.display="block"
musica.play()

for(let i=0;i<150;i++){

const confete=document.createElement("div")
confete.classList.add("confete")

confete.style.left=Math.random()*100+"vw"
confete.style.background=`hsl(${Math.random()*360},100%,50%)`

document.body.appendChild(confete)

setTimeout(()=>confete.remove(),3000)

}

})

function criarCoracao(){

const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(20+Math.random()*20)+"px"
heart.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),7000)

}

setInterval(criarCoracao,400)

</script>

</body>
</html>
